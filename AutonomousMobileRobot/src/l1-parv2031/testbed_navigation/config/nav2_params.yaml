# -----------------------------
# NAVIGATION2 PLANNER SERVER
# -----------------------------
# The planner_server is responsible for computing a global path
# from the robot's current position to the goal position.
# It typically uses the global costmap and a planning algorithm.

planner_server:
  ros__parameters:

    # Enables simulation time when running in Gazebo.
    # Required because Gazebo publishes a /clock topic instead of using system time.
    use_sim_time: true

    # Expected frequency (Hz) at which the planner should attempt to compute a new path.
    # If dynamic obstacles appear or the robot deviates from the path,
    # the planner will recompute a path at this rate.
    expected_planner_frequency: 1.0

    # List of planner plugins that this server can use.
    # In this case we define only one planner called "GridBased".
    planner_plugins: ["GridBased"]

    GridBased:

      # Plugin implementing the global planning algorithm.
      # NavFnPlanner implements Dijkstra/A* search on the global costmap
      # to compute the optimal path to the goal.
      plugin: "nav2_navfn_planner/NavfnPlanner"


# -----------------------------
# CONTROLLER SERVER
# -----------------------------
# The controller server is responsible for local motion control.
# It takes the global path generated by the planner and converts it
# into velocity commands for the robot.

controller_server:
  ros__parameters:

    # Enables simulation time.
    use_sim_time: true

    # List of controller plugins used for path following.
    controller_plugins: ["FollowPath"]

    FollowPath:

      # Regulated Pure Pursuit controller plugin.
      # This controller tracks the global path and generates smooth
      # velocity commands while considering curvature and obstacle proximity.
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"


# -----------------------------
# BEHAVIOR TREE NAVIGATOR
# -----------------------------
# The bt_navigator node orchestrates the navigation pipeline
# using a Behavior Tree (BT).
# It coordinates planning, control, and recovery behaviors.

bt_navigator:
  ros__parameters:

    # Enables simulation time.
    use_sim_time: true

    # Path to the Behavior Tree XML file that defines the navigation logic.
    # This file defines how the robot handles navigation tasks,
    # including replanning and recovery behaviors.
    default_bt_xml_filename: 
      "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_w_replanning_and_recovery.xml"


# -----------------------------
# BEHAVIOR SERVER
# -----------------------------
# The behavior server implements recovery behaviors used when navigation fails.
# For example:
# - clearing costmaps
# - rotating in place
# - backing up
# - waiting

behavior_server:
  ros__parameters:

    # Enables simulation time.
    use_sim_time: true


# -----------------------------
# GLOBAL COSTMAP
# -----------------------------
# The global costmap represents the entire map used for global path planning.
# It contains static map obstacles and possibly dynamic obstacles.

global_costmap:
  global_costmap:
    ros__parameters:

      # Enables simulation time for costmap updates.
      use_sim_time: true


# -----------------------------
# LOCAL COSTMAP
# -----------------------------
# The local costmap represents a smaller region around the robot.
# It is used by the controller to avoid nearby obstacles and follow the path.

local_costmap:
  local_costmap:
    ros__parameters:

      # Enables simulation time.
      use_sim_time: true